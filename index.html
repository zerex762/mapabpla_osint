<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE - SYSTEM LOCKED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --danger: #ff3333;
            --bg-dark: #05070a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg-dark); font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        /* Экран блокировки */
        #system-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0a0f18 0%, #000 100%);
            z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        /* Сетка на фоне для атмосферы */
        #system-lock::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }

        .lock-container {
            position: relative; z-index: 1; padding: 40px;
            border: 1px solid rgba(255, 51, 51, 0.3);
            background: rgba(10, 15, 25, 0.8);
            border-radius: 20px; backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.1);
        }

        .lock-icon {
            font-size: 60px; color: var(--danger); margin-bottom: 20px;
            animation: pulse-red 2s infinite;
        }

        h1 { font-family: 'Orbitron'; color: #fff; margin: 0 0 10px 0; letter-spacing: 3px; font-size: 22px; }
        p { color: rgba(255,255,255,0.6); font-size: 14px; max-width: 300px; margin-bottom: 30px; line-height: 1.5; }

        .unlock-btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 12px 30px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
            font-size: 12px; font-weight: bold; letter-spacing: 2px;
        }

        .unlock-btn:hover {
            background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent);
        }

        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; text-shadow: 0 0 0px var(--danger); }
            50% { transform: scale(1.1); opacity: 0.7; text-shadow: 0 0 20px var(--danger); }
        }

        /* Заглушка для карты (чтобы было видно, что она сзади, но закрыта) */
        #map-placeholder {
            width: 100%; height: 100%; filter: blur(20px) grayscale(1);
            background: url('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/6/22/35');
            background-size: cover;
        }
    </style>
</head>
<body>

<!-- Экран временного закрытия -->
<div id="system-lock">
    <div class="lock-container">
        <div class="lock-icon"><i class="fas fa-shield-halved"></i></div>
        <h1>КАРТА ЗАКРИТА</h1>
        <p>Доступ до стратегічного моніторингу тимчасово обмежено адміністратором або через технічне обслуговування.</p>
        
        <!-- Кнопка «Разблокировать» (только для тебя или по паролю) -->
        <button class="unlock-btn" onclick="unlockSystem()">АВТОРИЗАЦІЯ</button>
    </div>
</div>

<!-- Задний фон для вида -->
<div id="map-placeholder"></div>

<script>
    function unlockSystem() {
        // Здесь можно добавить проверку пароля:
        // let pass = prompt("Введіть код доступу:");
        // if(pass === "1234") { ... }

        const lockScreen = document.getElementById('system-lock');
        lockScreen.style.transition = "1s ease-out";
        lockScreen.style.opacity = "0";
        lockScreen.style.transform = "scale(1.2)";
        
        setTimeout(() => {
            lockScreen.style.display = "none";
            alert("Систему розблоковано. Завантаження даних...");
            // Тут можно добавить перенаправление на твою реальную карту
            // window.location.href = "твой_файл_карты.html";
        }, 1000);
    }
</script>

</body>
</html>
