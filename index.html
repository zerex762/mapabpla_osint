<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerex Monitoring Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .info-card {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 350px;
            width: 100%;
        }
        .time-stamp {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: #00ff88;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .regards {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .tg-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #0088cc;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }
        .tg-button:hover {
            background: #0099e6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.5);
        }
    </style>
</head>
<body>

    <div class="info-card">
        <div class="time-stamp">
            <i class="fa-regular fa-clock"></i> 16.06.2026 18:20
        </div>
        
        <div class="regards">З повагою,</div>
        
        <a href="https://t.me/odessa_osint26" target="_blank" class="tg-button">
            <i class="fa-brands fa-telegram text-xl"></i> odessa_osint26
        </a>
    </div>

</body>
</html>
