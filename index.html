<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE - Elite OSINT Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00f2ff;
            --danger: #ff3333;
            --warning: #ff9d00;
            --success: #00ff88;
            --bg-dark: #05070a;
            --glass: rgba(10, 20, 35, 0.85);
            --neon-border: rgba(0, 242, 255, 0.3);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-dark); font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        #map { width: 100%; height: 100%; z-index: 1; filter: brightness(0.8) contrast(1.1); background: #000; }

        /* ВІЙСЬКОВИЙ ПРИЦІЛ */
        .main-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 44px; height: 44px; z-index: 1500; pointer-events: none; opacity: 0.9;
        }
        .main-crosshair span {
            position: absolute; width: 10px; height: 10px; border-color: var(--accent); border-style: solid;
            filter: drop-shadow(0 0 4px var(--accent));
        }
        .tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
        .bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
        .br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
        .crosshair-dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 3px; height: 3px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--accent);
        }

        /* HUD TOP */
        .top-ui {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 2000;
            display: flex; justify-content: space-between; pointer-events: none; gap: 10px;
        }
        .box {
            background: var(--glass); backdrop-filter: blur(12px);
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--neon-border);
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px; pointer-events: auto;
        }
        .glow { color: var(--accent); text-shadow: 0 0 10px var(--accent); font-family: 'Orbitron'; }

        #mapNotify {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            z-index: 3000; background: var(--accent); color: #000; padding: 4px 20px;
            border-radius: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase;
            opacity: 0; transition: 0.4s; pointer-events: none; white-space: nowrap;
        }

        /* SIDE PANEL */
        .side-panel {
            position: absolute; top: 20px; right: -350px; z-index: 2100;
            background: var(--glass); backdrop-filter: blur(20px);
            width: 280px; border-radius: 15px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--neon-border);
        }
        .side-panel.active { right: 20px; }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--neon-border); display: flex; justify-content: space-between; align-items: center; }
        .panel-body { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .info-label { color: rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; }
        .info-value { font-family: 'Orbitron', sans-serif; color: #fff; font-size: 11px; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: var(--glass); backdrop-filter: blur(15px);
            padding: 8px; border-radius: 20px; display: flex; align-items: center; gap: 10px;
            border: 1px solid var(--neon-border); width: fit-content; max-width: 95vw;
        }
        .c-btn {
            width: 44px; height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
        }
        .c-btn.active-green { background: var(--success); color: #000; box-shadow: 0 0 15px var(--success); }
        .c-btn.active-red { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }

        .type-select {
            background: #000; color: var(--accent); border: 1px solid var(--neon-border);
            border-radius: 10px; padding: 10px; font-size: 10px; font-family: 'Orbitron';
            outline: none; max-width: 130px;
        }

        @media (max-width: 600px) {
            .top-ui { flex-direction: column; align-items: flex-start; gap: 5px; }
            .side-panel { width: calc(100% - 30px); top: auto; bottom: 85px; }
            .side-panel.active { right: 15px; left: 15px; }
            .c-btn { width: 40px; height: 40px; }
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-crosshair">
    <span class="tl"></span><span class="tr"></span>
    <span class="bl"></span><span class="br"></span>
    <div class="crosshair-dot"></div>
</div>

<div id="mapNotify">MODE UPDATED</div>

<div class="top-ui">
    <div style="display: flex; gap: 10px;">
        <div class="box"><i class="fa-solid fa-clock"></i> <span id="sysTime" class="glow">00:00:00</span></div>
        <div class="box"><i class="fa-solid fa-satellite-dish"></i> <span id="gpsStatus" class="glow" style="color: var(--danger);">GPS OFF</span></div>
    </div>
    <div class="box"><i class="fa-solid fa-crosshairs"></i> TARGETS: <span id="uavCount" class="glow">0</span></div>
</div>

<div id="sidePanel" class="side-panel">
    <div class="panel-header">
        <span style="font-family: 'Orbitron'; font-weight: 700; color: var(--accent);">TARGET DATA</span>
        <i class="fas fa-times" onclick="closeInfo()" style="cursor:pointer; opacity: 0.5;"></i>
    </div>
    <div class="panel-body">
        <div class="info-row"><span class="info-label">IDENTIFICATION:</span> <span class="info-value" id="objId">--</span></div>
        <div class="info-row"><span class="info-label">CLASSIFICATION:</span> <span class="info-value" id="objType">--</span></div>
        <div class="info-row"><span class="info-label">COORDINATES:</span> <span class="info-value" id="objCoords" style="color: var(--accent);">--</span></div>
        <div class="info-row"><span class="info-label">RANGE TO ME:</span> <span class="info-value" id="objRange" style="color: var(--warning);">SEARCHING...</span></div>
        <div class="info-row"><span class="info-label">BEARING:</span> <span class="info-value" id="objAngle">--</span></div>
    </div>
</div>

<div id="map"></div>

<div class="bottom-nav">
    <button class="c-btn" onclick="nextTheme()"><i class="fa-solid fa-layer-group"></i></button>
    <button class="c-btn" onclick="locateMe()"><i class="fa-solid fa-location-crosshairs"></i></button>
    
    <select id="typeSelect" class="type-select">
        <option value="shahed-238-standart">SHAHED-238</option>
        <option value="shahed-vp-standart">SHAHED-136</option>
        <option value="herbera-standart">GERBERA</option>
        <option value="kalibr-standart">MISSILE</option>
    </select>

    <button id="addBtn" class="c-btn"><i class="fas fa-plus"></i></button>
    <button id="delBtn" class="c-btn"><i class="fas fa-trash-can"></i></button>
    <button class="c-btn" onclick="location.reload()"><i class="fas fa-sync"></i></button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://shmap-8c0fa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('drones');

    // Оновлений масив тем з доданою сірою темою (з містами)
    const themes = [
        { name: "RADAR DARK", url: 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png' },
        { name: "SATELLITE", url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}' },
        { name: "GRAY OPS (CITIES)", url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png' }
    ];

    let tIdx = 0;
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([48.4, 32.5], 6);
    let layer = L.tileLayer(themes[0].url).addTo(map);

    let userPos = null;
    let userMarker = null;

    function locateMe() {
        map.locate({setView: true, maxZoom: 10});
    }

    map.on('locationfound', (e) => {
        userPos = e.latlng;
        document.getElementById('gpsStatus').innerText = "GPS LIVE";
        document.getElementById('gpsStatus').style.color = "var(--success)";
        
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker(userPos, {
            radius: 8, color: '#00f2ff', fillColor: '#00f2ff', fillOpacity: 0.5
        }).addTo(map).bindPopup("Ваша позиція");
    });

    map.on('locationerror', () => {
        alert("Доступ до GPS заборонено або не знайдено");
    });

    let obs = {}, mode = null, tempPos = null;

    function sync(id, d) {
        if (!d) return;
        const angleRad = (d.angle - 90) * Math.PI / 180;
        const distLine = 0.02; 
        const endLat = d.lat + (Math.cos(angleRad) * distLine);
        const endLng = d.lng + (Math.sin(angleRad) * distLine);

        if (obs[id]) {
            obs[id].marker.setLatLng([d.lat, d.lng]);
            obs[id].line.setLatLngs([[d.lat, d.lng], [endLat, endLng]]);
        } else {
            const icon = L.divIcon({ 
                className: 'uav-icon', 
                html: `<img src="${d.type}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/583/583360.png'" style="width:32px; height:32px; transform:rotate(${d.angle || 0}deg); filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));">`, 
                iconSize: [32, 32], iconAnchor: [16, 16] 
            });
            const marker = L.marker([d.lat, d.lng], { icon: icon }).addTo(map);
            const line = L.polyline([[d.lat, d.lng], [endLat, endLng]], { color: '#ff9d00', weight: 2, dashArray: '5, 10' }).addTo(map);

            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                if (mode === 'delete') db.child(id).remove();
                else updateUI(id, d);
            });
            obs[id] = { marker, line, data: d };
        }
        updateCounters();
    }

    function updateUI(id, d) {
        document.getElementById('sidePanel').classList.add('active');
        document.getElementById('objId').innerText = id.substring(1, 8).toUpperCase();
        document.getElementById('objType').innerText = d.type.split('-')[0].toUpperCase();
        document.getElementById('objCoords').innerText = `${d.lat.toFixed(3)}, ${d.lng.toFixed(3)}`;
        document.getElementById('objAngle').innerText = `${Math.round(d.angle)}°`;

        if (userPos) {
            const distance = (map.distance(userPos, [d.lat, d.lng]) / 1000).toFixed(1);
            document.getElementById('objRange').innerText = `${distance} KM`;
        } else {
            document.getElementById('objRange').innerText = "GPS REQ.";
        }
    }

    function updateCounters() {
        document.getElementById('uavCount').innerText = Object.keys(obs).length;
    }

    function closeInfo() { document.getElementById('sidePanel').classList.remove('active'); }

    map.on('click', (e) => {
        closeInfo();
        if (mode === 'add') {
            if (!tempPos) { 
                tempPos = e.latlng;
                L.circleMarker(tempPos, {radius: 5, color: '#00f2ff'}).addTo(map).fadeOut(500);
            } else {
                let angle = (Math.atan2(e.latlng.lng - tempPos.lng, e.latlng.lat - tempPos.lat) * 180 / Math.PI) + 90;
                db.push({ lat: tempPos.lat, lng: tempPos.lng, type: document.getElementById('typeSelect').value, angle: angle });
                tempPos = null; mode = null; resetNav();
            }
        }
    });

    L.CircleMarker.prototype.fadeOut = function(ms) {
        let op = 1;
        const itv = setInterval(() => {
            op -= 0.1; this.setStyle({opacity: op, fillOpacity: op/2});
            if(op <= 0) { clearInterval(itv); map.removeLayer(this); }
        }, ms/10);
    };

    // Оновлена функція перемикання тем з повідомленням
    function nextTheme() {
        tIdx = (tIdx + 1) % themes.length;
        map.removeLayer(layer);
        layer = L.tileLayer(themes[tIdx].url).addTo(map);
        
        // Повідомлення про зміну теми
        const notify = document.getElementById('mapNotify');
        notify.innerText = themes[tIdx].name;
        notify.style.opacity = 1;
        setTimeout(() => notify.style.opacity = 0, 1500);
    }

    document.getElementById('addBtn').onclick = function() { mode = 'add'; resetNav(); this.classList.add('active-green'); };
    document.getElementById('delBtn').onclick = function() { mode = 'delete'; resetNav(); this.classList.add('active-red'); };
    function resetNav() { document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active-green', 'active-red')); }

    setInterval(() => {
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

    db.on('child_added', s => sync(s.key, s.val()));
    db.on('child_changed', s => sync(s.key, s.val()));
    db.on('child_removed', s => { 
        if(obs[s.key]) { map.removeLayer(obs[s.key].marker); map.removeLayer(obs[s.key].line); delete obs[s.key]; }
        updateCounters(); closeInfo();
    });
</script>
</body>
</html>
