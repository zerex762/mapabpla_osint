<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>SKY DEFENSE - Strategic Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
    :root { 
        --accent: #ff3333;
        --danger: #ff3333;
        --warning: #ffcc00;
        --success: #00ff88;
        --bg-dark: #0a0805;
        --glass: rgba(15, 5, 5, 0.85);
        --neon-border: rgba(255, 51, 51, 0.3);
        --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.9);
        --mono-gold: #ffcc00;
    }

    * { -webkit-user-select: none; -moz-user-select: none; user-select: none; box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-dark); font-family: 'Inter', sans-serif; overflow: hidden; color: white; }

    #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .boot-loader { width: 250px; text-align: left; font-family: 'Orbitron'; }
    .boot-text { font-size: 10px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
    .progress-bar { width: 100%; height: 2px; background: rgba(255, 51, 51, 0.1); position: relative; overflow: hidden; }
    .progress-fill { 
        width: 0%; height: 100%; background: var(--accent); 
        box-shadow: 0 0 15px var(--accent); animation: load 2.5s forwards; 
    }
    @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
    .logo-anim { font-size: 24px; font-family: 'Orbitron'; margin-bottom: 20px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    #privacy-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9000; display: none;
        align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }
    .policy-box {
        background: var(--glass); border: 1px solid var(--accent);
        padding: 30px; border-radius: 15px; max-width: 500px; width: 90%;
        text-align: center; box-shadow: 0 0 40px rgba(255, 51, 51, 0.15);
        animation: modalFlyIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes modalFlyIn {
        0% { transform: scale(0.8) translateY(50px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .policy-box h2 { font-family: 'Orbitron'; color: var(--accent); font-size: 18px; margin: 0 0 15px 0; letter-spacing: 2px; }
    .policy-content {
        text-align: left; font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.7);
        max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding: 15px;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255, 51, 51, 0.1);
    }
    .policy-content strong { color: var(--accent); }
    .accept-btn {
        background: transparent; border: 1px solid var(--accent); color: var(--accent);
        padding: 12px 40px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
        font-weight: bold; letter-spacing: 1px;
    }
    .accept-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

    #map { width: 100%; height: 100%; z-index: 1; background: #000; position: relative; }
    #map::after {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: repeating-linear-gradient(0deg, rgba(255, 51, 51, 0.03) 0px, rgba(255, 51, 51, 0.03) 1px, transparent 1px, transparent 2px);
        pointer-events: none; z-index: 1000;
    }

    .uav-icon img {
        width: 48px; height: 48px;
        filter: invert(27%) sepia(91%) saturate(7454%) hue-rotate(354deg) brightness(94%) contrast(110%) drop-shadow(0 0 8px var(--accent));
    }
    .active-uav img { animation: targetPulse 2s infinite ease-in-out; }
    @keyframes targetPulse {
        0%, 100% { filter: invert(27%) sepia(91%) saturate(7454%) hue-rotate(354deg) brightness(80%) drop-shadow(0 0 3px var(--accent)); }
        50% { filter: invert(27%) sepia(91%) saturate(7454%) hue-rotate(354deg) brightness(120%) drop-shadow(0 0 15px var(--accent)); }
    }

    .main-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; z-index: 1500; pointer-events: none; opacity: 0.5; }
    .main-crosshair span { position: absolute; width: 8px; height: 8px; border-color: var(--accent); border-style: solid; }
    .tl { top: 0; left: 0; border-width: 1.5px 0 0 1.5px; } .tr { top: 0; right: 0; border-width: 1.5px 1.5px 0 0; }
    .bl { bottom: 0; left: 0; border-width: 0 0 1.5px 1.5px; } .br { bottom: 0; right: 0; border-width: 0 1.5px 1.5px 0; }

    .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 2000; display: flex; justify-content: space-between; pointer-events: none; }
    .status-group { display: flex; gap: 10px; pointer-events: auto; flex-wrap: wrap; }
    .box { background: var(--glass); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--neon-border); font-size: 11px; font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 8px; box-shadow: var(--panel-shadow); }
    .glow { color: var(--accent); text-shadow: 0 0 8px var(--accent); font-family: 'Orbitron'; }

    .side-panel { position: absolute; top: 20px; right: -350px; z-index: 2100; background: var(--glass); backdrop-filter: blur(15px); width: 280px; border-radius: 12px; transition: 0.4s; border: 1px solid var(--neon-border); box-shadow: var(--panel-shadow); }
    .side-panel.active { right: 20px; }
    .panel-header { padding: 15px; border-bottom: 1px solid rgba(255, 51, 51, 0.1); display: flex; justify-content: space-between; align-items: center; }
    .panel-header span { font-family: 'Orbitron'; font-weight: 700; color: var(--accent); font-size: 14px; }
    .panel-body { padding: 20px; }
    .data-block { margin-bottom: 15px; }
    .data-label { color: rgba(255,255,255,0.4); font-size: 9px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
    .data-value { font-family: 'Orbitron'; color: #fff; font-size: 14px; }

    .live-timer { color: var(--success); text-shadow: 0 0 5px var(--success); }

    .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--glass); backdrop-filter: blur(15px); padding: 10px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--neon-border); box-shadow: var(--panel-shadow); }
    .c-btn { width: 45px; height: 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; text-decoration: none; }
    .c-btn:hover { background: rgba(255, 51, 51, 0.1); border-color: var(--accent); color: var(--accent); }

    .support-btn { border-color: var(--mono-gold); color: var(--mono-gold); }
    .support-btn:hover { background: rgba(255, 204, 0, 0.15); border-color: #fff; color: #fff; box-shadow: 0 0 15px var(--mono-gold); }

    #mapNotify { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--accent); color: #fff; padding: 5px 20px; border-radius: 4px; font-size: 10px; font-weight: 900; opacity: 0; transition: 0.3s; pointer-events: none; font-family: 'Orbitron'; }
    .privacy-link { position: absolute; bottom: 10px; right: 15px; z-index: 2001; font-size: 8px; opacity: 0.4; color: white; text-decoration: none; font-family: 'Orbitron'; letter-spacing: 1px; }
    .privacy-link:hover { opacity: 1; color: var(--accent); }

    /* ---------- RADAR PANEL ---------- */
    #radarPanel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 2100;
        background: var(--glass);
        backdrop-filter: blur(16px);
        border: 1px solid var(--neon-border);
        border-radius: 12px;
        padding: 15px;
        width: 260px;
        display: none;
        box-shadow: var(--panel-shadow);
    }
    .radar-title {
        font-family: 'Orbitron';
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 1px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .radar-title i { font-size: 14px; opacity: 0.7; }
    #radarCanvas {
        display: block;
        margin: 0 auto 10px;
        border-radius: 50%;
        background: #040208;
    }
    .radar-list {
        max-height: 150px;
        overflow-y: auto;
    }
    .radar-item {
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        padding: 4px 0;
        border-bottom: 1px solid var(--neon-border);
        display: flex;
        justify-content: space-between;
        font-family: 'Orbitron';
    }
    .radar-item .ri-eta { color: var(--accent); }
    #radarEmpty {
        font-size: 11px;
        color: rgba(255,255,255,0.3);
        text-align: center;
        padding: 8px 0;
        font-family: 'Orbitron';
    }

    /* ---------- TABLE SHEET (active targets) ---------- */
    .bsheet-bg{position:fixed;inset:0;z-index:8500;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);}
    .bsheet-bg.show{display:flex;}
    .bsheet{
        background:#0c0808;border:1px solid var(--border);border-bottom:none;
        border-radius:20px 20px 0 0;width:min(560px,100%);
        padding:20px 16px calc(var(--safe-b) + 28px);
        max-height:88vh;overflow-y:auto;
        animation:shUp .32s cubic-bezier(.19,1,.22,1) forwards;
    }
    @keyframes shUp{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}
    .bsh-drag{width:36px;height:3px;background:rgba(255,255,255,.12);border-radius:99px;margin:0 auto 18px;}
    .bsh-title{font-family:'Orbitron';font-size:11px;color:var(--a);letter-spacing:.2em;text-align:center;margin-bottom:16px;}
    .bsh-close{display:block;width:100%;margin-top:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.3);font-family:'Orbitron';font-size:9px;letter-spacing:.2em;padding:10px;cursor:pointer;border-radius:8px;transition:.2s;}
    .bsh-close:hover{color:#fff;}
    /* THEME GRID (re‑used vars from :root) */
    .th-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
    .th-card{border:1px solid var(--border2);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;}
    .th-card:active{transform:scale(.97);}
    .th-card.on{border-color:var(--a);box-shadow:0 0 12px rgba(255,51,51,.3);}
    .th-card.on::after{content:'✓';position:absolute;top:4px;right:6px;color:var(--a);font-size:11px;font-weight:900;}
    .th-prev{height:54px;}
    .p0{background:linear-gradient(135deg,#0d1117,#161b22,#0a0a0a);}
    .p1{background:linear-gradient(135deg,#1a3a1a,#2d5a1b,#4a7c3f);}
    .p2{background:linear-gradient(135deg,#060914,#0a0f24,#0d1530);}
    .p3{background:linear-gradient(135deg,#c8d8a0,#b0c080,#98a870);}
    .p4{height:54px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-size:13px;color:#00e5ff;text-shadow:0 0 8px #00e5ff;}
    .p5{background:linear-gradient(135deg,#e8e0d0,#d4c9b5,#c8bea8);}
    .p6{background:linear-gradient(135deg,#000000,#434343,#000000);}
    .p7{background:linear-gradient(135deg,#000000,#000000,#000000);}
    .p8{background:linear-gradient(135deg,#000000,#000000,#000000);}
    .p9{background:linear-gradient(135deg,#000000,#000000,#000000);}
    .p10{background:linear-gradient(135deg,#000000,#000000,#000000);}
    .p11{background:linear-gradient(135deg,#000000,#000000,#000000);}
    .th-name{padding:4px 5px;font-size:7px;font-family:'Orbitron';color:rgba(255,255,255,.5);letter-spacing:.08em;text-align:center;background:#060303;}
    /* Bright row */
    .br-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .br-row span{font-family:'Orbitron';font-size:8px;color:rgba(255,255,255,.35);white-space:nowrap;letter-spacing:.1em;}
    .rng{flex:1;-webkit-appearance:none;height:3px;border-radius:99px;outline:none;cursor:pointer;}
    .rng::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 0 5px var(--a);}
    .rng-val{font-family:'Orbitron';font-size:9px;color:var(--a);width:30px;text-align:right;}
    /* SETTINGS */
    .set-sec{margin-bottom:16px;}
    .set-sec-lbl{font-family:'Orbitron';font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;display:block;border-bottom:1px solid var(--border2);padding-bottom:5px;}
    .set-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .set-row > span{font-size:12px;color:rgba(255,255,255,.65);}
    /* toggle */
    .tog{position:relative;width:38px;height:20px;flex-shrink:0;}
    .tog input{opacity:0;width:0;height:0;}
    .tog-sl{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:20px;cursor:pointer;transition:.25s;}
    .tog-sl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#555;border-radius:50%;transition:.25s;}
    .tog input:checked+.tog-sl{background:var(--a);}
    .tog input:checked+.tog-sl:before{transform:translateX(18px);background:#fff;}
    /* swatches */
    .swg{display:flex;gap:6px;}
    .sw{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:.15s;}
    .sw.on{border-color:#fff;transform:scale(1.2);}
    .sl-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .sl-row > span{font-size:11px;color:rgba(255,255,255,.65);flex-shrink:0;width:110px;}
    .sl-val{font-family:'Orbitron';font-size:9px;color:var(--a);width:30px;text-align:right;}
    .snd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .snd-btn{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:rgba(255,255,255,.55);font-size:10px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:.15s;text-align:left;}
    .snd-btn:hover,.snd-btn.on{border-color:var(--a);color:var(--a);}
    /* TABLE SHEET */
    #tblTable{width:100%;border-collapse:collapse;font-size:10px;}
    #tblTable th{font-family:'Orbitron';font-size:7px;color:rgba(255,255,255,.3);letter-spacing:.15em;text-transform:uppercase;padding:5px 6px;border-bottom:1px solid var(--border2);}
    #tblTable td{padding:6px 6px;border-bottom:1px solid rgba(255,255,255,.03);color:rgba(255,255,255,.7);font-family:'Orbitron';font-size:9px;}
    #tblTable tr:hover td{background:var(--a3);cursor:pointer;}
    .t-badge{background:var(--a2);border:1px solid var(--border);color:var(--a);padding:1px 5px;border-radius:3px;font-size:8px;}
    /* END OF TABLE SHEET STYLES */
    /* Re‑use the CSS variables from :root for the sheet */
    :root {
        --border:rgba(255,51,51,0.22);
        --border2:rgba(255,255,255,0.07);
        --a:#ff3333;
        --a2:rgba(255,51,51,0.18);
        --a3:rgba(255,51,51,0.08);
        --safe-b:env(safe-area-inset-bottom
