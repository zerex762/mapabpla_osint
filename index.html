<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE - Strategic Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00f2ff;
            --danger: #ff3333;
            --warning: #ff9d00;
            --success: #00ff88;
            --bg-dark: #05070a;
            --glass: rgba(10, 20, 35, 0.85);
            --neon-border: rgba(0, 242, 255, 0.25);
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { -webkit-user-select: none; -moz-user-select: none; user-select: none; box-sizing: border-box; }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-dark); font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.8s;
        }
        .boot-loader { width: 250px; text-align: left; font-family: 'Orbitron'; }
        .boot-text { font-size: 10px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .progress-bar { width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1); position: relative; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: load 2.5s forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        .logo-anim { font-size: 24px; font-family: 'Orbitron'; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #privacy-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .policy-box {
            background: var(--glass); border: 1px solid var(--accent);
            padding: 30px; border-radius: 15px; max-width: 500px; width: 90%;
            text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }
        .accept-btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 12px 40px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
        }
        .accept-btn:hover { background: var(--accent); color: #000; }

        #map { width: 100%; height: 100%; z-index: 1; background: #000; }
        
        .uav-icon img {
            width: 40px; height: 40px;
            filter: invert(1) brightness(2) drop-shadow(0 0 5px var(--accent));
            transition: transform 0.3s linear;
        }
        .active-uav img { animation: targetPulse 2s infinite ease-in-out; }
        @keyframes targetPulse {
            0%, 100% { filter: invert(1) brightness(2) drop-shadow(0 0 2px var(--accent)); }
            50% { filter: invert(1) brightness(3) drop-shadow(0 0 10px var(--accent)); }
        }

        .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 2000; display: flex; justify-content: space-between; pointer-events: none; }
        .box { background: var(--glass); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--neon-border); font-size: 11px; display: flex; align-items: center; gap: 8px; }
        .glow { color: var(--accent); text-shadow: 0 0 8px var(--accent); font-family: 'Orbitron'; }

        .side-panel { position: absolute; top: 20px; right: -350px; z-index: 2100; background: var(--glass); width: 280px; border-radius: 12px; transition: 0.4s; border: 1px solid var(--neon-border); }
        .side-panel.active { right: 20px; }
        .panel-header { padding: 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .panel-body { padding: 20px; }
        .data-label { color: rgba(255,255,255,0.4); font-size: 9px; text-transform: uppercase; display: block; }
        .data-value { font-family: 'Orbitron'; color: #fff; font-size: 14px; margin-bottom: 10px; }

        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--glass); padding: 10px; border-radius: 20px; display: flex; gap: 15px; border: 1px solid var(--neon-border); }
        .c-btn { width: 45px; height: 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; }
        
        #mapNotify { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--accent); color: #000; padding: 5px 20px; border-radius: 4px; font-size: 10px; opacity: 0; transition: 0.3s; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="logo-anim" style="color:var(--accent)">SKY DEFENSE</div>
    <div class="boot-loader"><div class="progress-bar"><div class="progress-fill"></div></div></div>
</div>

<div id="privacy-modal">
    <div class="policy-box">
        <h2 style="font-family: 'Orbitron'; color: var(--accent);">PROTOCOL</h2>
        <p style="font-size: 12px; color: #ccc;">Система розрахунку координат та ETA активна.</p>
        <button class="accept-btn" onclick="acceptPolicy()">START</button>
    </div>
</div>

<div id="map"></div>
<div id="mapNotify">SYNC COMPLETED</div>

<div class="top-ui">
    <div class="box"><i class="fa-solid fa-clock"></i> <span id="sysTime" class="glow">00:00:00</span></div>
    <div class="box"><i class="fa-solid fa-crosshairs"></i> ACTIVE: <span id="uavCount" class="glow">0</span></div>
</div>

<div id="sidePanel" class="side-panel">
    <div class="panel-header"><span style="font-family: 'Orbitron'; color: var(--accent);">INFO</span><i class="fas fa-times" onclick="closeInfo()" style="cursor:pointer;"></i></div>
    <div class="panel-body">
        <span class="data-label">TYPE</span><div class="data-value" id="objType">--</div>
        <span class="data-label">COORDS</span><div class="data-value" id="objCoords">--</div>
        <span class="data-label">RANGE / ETA</span><div class="data-value" id="objRange">--</div>
    </div>
</div>

<div class="bottom-nav" id="ui-nav" style="display: none;">
    <button class="c-btn" onclick="nextTheme()"><i class="fa-solid fa-layer-group"></i></button>
    <button class="c-btn" onclick="map.locate({setView: true})"><i class="fa-solid fa-location-crosshairs"></i></button>
</div>

<script>
    const themes = [
        { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' },
        { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }
    ];
    let tIdx = 0;
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([48.4, 32.5], 6);
    let layer = L.tileLayer(themes[0].url).addTo(map);

    function nextTheme() {
        tIdx = (tIdx + 1) % themes.length;
        map.removeLayer(layer);
        layer = L.tileLayer(themes[tIdx].url).addTo(map);
    }

    function showNotify(text) {
        const n = document.getElementById('mapNotify');
        n.innerText = text; n.style.opacity = "1";
        setTimeout(() => n.style.opacity = "0", 1500);
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            if (!localStorage.getItem('p_acc')) document.getElementById('privacy-modal').style.display = 'flex';
            else fullStartup();
        }, 2600);
    });

    function acceptPolicy() {
        localStorage.setItem('p_acc', 'true');
        document.getElementById('privacy-modal').style.display = 'none';
        fullStartup();
    }

    function fullStartup() {
        document.getElementById('ui-nav').style.display = 'flex';
        showNotify("SYSTEM ONLINE");
    }

    firebase.initializeApp({ databaseURL: "https://shmap-8c0fa-default-rtdb.firebaseio.com" });
    const db = firebase.database().ref('drones');

    // РОЗШИРЕНИЙ СПИСОК ШВИДКОСТЕЙ
    const SPEED_MAP = {
        'shahed': 185, 'gerbera': 150, 'fpv': 150, 'raketa': 850, 
        'kalibr': 880, 'kh-101': 720, 'ballistic': 3500, 'default': 200
    };
    
    const FALLBACK_ICON = 'https://cdn-icons-png.flaticon.com/512/2503/2503508.png';
    let userPos = null;
    let obs = {};

    map.on('locationfound', (e) => {
        userPos = e.latlng;
        L.circleMarker(userPos, { radius: 5, color: '#00f2ff' }).addTo(map);
    });

    function sync(id, d) {
        if (!d) return;
        const type = (d.type || 'shahed').toLowerCase();
        
        // Визначаємо іконку: якщо є спеціальна назва - беремо її, інакше тип.png
        let iconUrl = `${type}.png`; 

        if (obs[id]) {
            obs[id].marker.setLatLng([d.lat, d.lng]);
            const img = obs[id].marker.getElement()?.querySelector('img');
            if (img) img.style.transform = `rotate(${d.angle || 0}deg)`;
            obs[id].data = d;
        } else {
            const icon = L.divIcon({ 
                className: 'uav-icon active-uav', 
                html: `<img src="${iconUrl}" onerror="this.src='${FALLBACK_ICON}';" style="transform:rotate(${d.angle || 0}deg);">`, 
                iconSize: [40, 40], iconAnchor: [20, 20] 
            });
            const marker = L.marker([d.lat, d.lng], { icon }).addTo(map);
            marker.on('click', () => updateUI(id, d));
            obs[id] = { marker, data: d };
        }
        updateCounters();
    }

    function updateUI(id, d) {
        const side = document.getElementById('sidePanel');
        side.classList.add('active');
        document.getElementById('objType').innerText = d.type.toUpperCase();
        document.getElementById('objCoords').innerText = `${d.lat.toFixed(3)}, ${d.lng.toFixed(3)}`;
        
        if (userPos) {
            const dist = (map.distance(userPos, [d.lat, d.lng]) / 1000);
            const speed = SPEED_MAP[Object.keys(SPEED_MAP).find(k => d.type.toLowerCase().includes(k))] || 200;
            const eta = Math.round((dist / speed) * 60);
            document.getElementById('objRange').innerText = `${dist.toFixed(1)} KM / ~${eta} MIN`;
        }
    }

    function updateCounters() { document.getElementById('uavCount').innerText = Object.keys(obs).length; }
    function closeInfo() { document.getElementById('sidePanel').classList.remove('active'); }
    
    db.on('child_added', s => sync(s.key, s.val()));
    db.on('child_changed', s => sync(s.key, s.val()));
    db.on('child_removed', s => { if(obs[s.key]) { map.removeLayer(obs[s.key].marker); delete obs[s.key]; updateCounters(); } });

    setInterval(() => { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
