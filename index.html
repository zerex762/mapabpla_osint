<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE - Strategic Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00f2ff;
            --danger: #ff3333;
            --warning: #ff9d00;
            --success: #00ff88;
            --bg-dark: #05070a;
            --glass: rgba(10, 20, 35, 0.85);
            --neon-border: rgba(0, 242, 255, 0.25);
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { -webkit-user-select: none; -moz-user-select: none; user-select: none; box-sizing: border-box; }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-dark); font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        
        #map { width: 100%; height: 100%; z-index: 1; background: #000; position: relative; }
        
        /* Стиль для іконок з папки */
        .uav-icon img {
            width: 32px;
            height: 32px;
            /* Фільтр для чорних іконок: робимо їх білими та додаємо світіння акцентним кольором */
            filter: invert(1) brightness(2) drop-shadow(0 0 5px var(--accent));
            transition: transform 0.3s ease-out;
        }

        .active-uav img {
            animation: targetPulse 2s infinite ease-in-out;
        }

        @keyframes targetPulse {
            0%, 100% { filter: invert(1) brightness(2) drop-shadow(0 0 3px var(--accent)); }
            50% { filter: invert(1) brightness(3) drop-shadow(0 0 10px var(--accent)); }
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.8s;
        }
        .boot-loader { width: 250px; font-family: 'Orbitron'; }
        .progress-bar { width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1); overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: load 2.5s forwards; }
        @keyframes load { 100% { width: 100%; } }

        /* UI */
        .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 2000; display: flex; justify-content: space-between; pointer-events: none; }
        .status-group { display: flex; gap: 10px; pointer-events: auto; }
        .box { background: var(--glass); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--neon-border); font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .glow { color: var(--accent); text-shadow: 0 0 8px var(--accent); font-family: 'Orbitron'; }

        .side-panel { position: absolute; top: 20px; right: -350px; z-index: 2100; background: var(--glass); backdrop-filter: blur(15px); width: 280px; border-radius: 12px; transition: 0.4s; border: 1px solid var(--neon-border); }
        .side-panel.active { right: 20px; }
        .panel-header { padding: 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); font-family: 'Orbitron'; color: var(--accent); }
        .panel-body { padding: 20px; }
        .data-block { margin-bottom: 15px; }
        .data-label { color: rgba(255,255,255,0.4); font-size: 9px; text-transform: uppercase; display: block; }
        .data-value { font-family: 'Orbitron'; font-size: 14px; }

        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--glass); backdrop-filter: blur(15px); padding: 10px; border-radius: 20px; display: flex; gap: 15px; border: 1px solid var(--neon-border); }
        .c-btn { width: 45px; height: 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .c-btn:hover { border-color: var(--accent); color: var(--accent); }

        #mapNotify { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--accent); color: #000; padding: 5px 20px; border-radius: 4px; font-size: 10px; opacity: 0; transition: 0.3s; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="glow" style="font-size: 24px; margin-bottom: 10px;">SKY DEFENSE</div>
    <div class="boot-loader">
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
</div>

<div id="map"></div>

<div id="mapNotify">SYNC COMPLETED</div>

<div class="top-ui">
    <div class="status-group">
        <div class="box"><i class="fa-solid fa-clock"></i> <span id="sysTime" class="glow">00:00:00</span></div>
        <div class="box"><i class="fa-solid fa-satellite-dish"></i> <span id="gpsStatus" style="color: var(--danger);">OFFLINE</span></div>
    </div>
    <div class="box"><i class="fa-solid fa-crosshairs"></i> <span id="uavCount" class="glow">0</span> OBJECTS</div>
</div>

<div id="sidePanel" class="side-panel">
    <div class="panel-header">TRACKING INFO</div>
    <div class="panel-body">
        <div class="data-block"><span class="data-label">Class</span><div class="data-value" id="objType">--</div></div>
        <div class="data-block"><span class="data-label">Position</span><div class="data-value" id="objCoords" style="color: var(--accent);">--</div></div>
        <div class="data-block" style="display: flex;">
            <div style="width: 50%;"><span class="data-label">Range / ETA</span><div class="data-value" id="objRange">--</div></div>
            <div style="width: 50%;"><span class="data-label">Course</span><div class="data-value" id="objAngle">--</div></div>
        </div>
        <div class="data-block"><span class="data-label">Reference ID</span><div class="data-value" id="objId" style="font-size: 10px; opacity: 0.6;">--</div></div>
    </div>
</div>

<div class="bottom-nav">
    <button class="c-btn" onclick="nextTheme()"><i class="fa-solid fa-layer-group"></i></button>
    <button class="c-btn" onclick="locateMe()"><i class="fa-solid fa-location-crosshairs"></i></button>
    <button class="c-btn" onclick="location.reload()"><i class="fas fa-sync"></i></button>
</div>

<script>
    const themes = [
        { name: "ULTRA DARK", url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' },
        { name: "SATELLITE", url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }
    ];

    let tIdx = 0;
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([48.4, 32.5], 6);
    let layer = L.tileLayer(themes[0].url).addTo(map);

    function nextTheme() {
        tIdx = (tIdx + 1) % themes.length;
        map.removeLayer(layer);
        layer = L.tileLayer(themes[tIdx].url).addTo(map);
        showNotify("THEME: " + themes[tIdx].name);
    }

    function showNotify(text) {
        const n = document.getElementById('mapNotify');
        n.innerText = text; n.style.opacity = "1";
        setTimeout(() => n.style.opacity = "0", 1500);
    }

    // Firebase
    const firebaseConfig = { databaseURL: "https://shmap-8c0fa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('drones');

    const FALLBACK_ICON = 'https://cdn-icons-png.flaticon.com/512/2503/2503508.png';
    const SPEED_MAP = { 'shahed-vp-standart': 185, 'shahed-238-standart': 550, 'pu-iskander-standart': 0, 'kalibr-standart': 880 };

    let obs = {};
    let userPos = null;

    function locateMe() { map.locate({setView: true, maxZoom: 8}); }
    map.on('locationfound', (e) => {
        userPos = e.latlng;
        document.getElementById('gpsStatus').innerText = "LINK ACTIVE";
        document.getElementById('gpsStatus').style.color = "var(--success)";
        L.circleMarker(e.latlng, { radius: 6, color: '#fff', fillColor: '#00f2ff', fillOpacity: 0.8 }).addTo(map);
    });

    function sync(id, d) {
        if (!d) return;

        // Перевірка часу (видаляємо старі через 20 хв)
        const now = Date.now();
        if ((now - (d.timestamp || now)) / 1000 / 60 > 20) {
            removeObject(id); return;
        }

        const angle = d.angle || 0;

        if (obs[id]) {
            obs[id].marker.setLatLng([d.lat, d.lng]);
            obs[id].circle.setLatLng([d.lat, d.lng]);
            const img = obs[id].marker.getElement()?.querySelector('img');
            if (img) img.style.transform = `rotate(${angle}deg)`;
            obs[id].data = d;
        } else {
            // Коло точності
            const circle = L.circle([d.lat, d.lng], {
                radius: d.accuracy || 5000,
                color: 'var(--accent)', weight: 1, fillOpacity: 0.05, interactive: false
            }).addTo(map);

            // Ключове місце: Підключення ваших іконок
            const icon = L.divIcon({
                className: 'uav-icon active-uav',
                html: `<img src="${d.type}.png" onerror="this.src='${FALLBACK_ICON}';" style="transform:rotate(${angle}deg);">`,
                iconSize: [32, 32], iconAnchor: [16, 16]
            });

            const marker = L.marker([d.lat, d.lng], { icon: icon }).addTo(map);
            marker.on('click', () => updateUI(id, d));

            obs[id] = { marker, circle, data: d };
        }
        updateCounters();
    }

    function removeObject(id) {
        if (obs[id]) {
            map.removeLayer(obs[id].marker);
            map.removeLayer(obs[id].circle);
            delete obs[id];
            updateCounters();
        }
    }

    function updateUI(id, d) {
        document.getElementById('sidePanel').classList.add('active');
        document.getElementById('objId').innerText = "REF_" + id.substring(0,6).toUpperCase();
        document.getElementById('objType').innerText = (d.type || 'UNKNOWN').replace('-standart', '').toUpperCase();
        document.getElementById('objCoords').innerText = `${d.lat.toFixed(3)}, ${d.lng.toFixed(3)}`;
        document.getElementById('objAngle').innerText = `${Math.round(d.angle || 0)}°`;
        
        if (userPos) {
            const dist = (map.distance(userPos, [d.lat, d.lng]) / 1000);
            const speed = SPEED_MAP[d.type] || 200;
            const eta = speed > 0 ? Math.round(dist / speed * 60) : '--';
            document.getElementById('objRange').innerHTML = `${dist.toFixed(1)} KM<br><span style="color:var(--accent); font-size:10px;">ETA: ~${eta} MIN</span>`;
        }
    }

    function updateCounters() { document.getElementById('uavCount').innerText = Object.keys(obs).length; }

    map.on('click', () => document.getElementById('sidePanel').classList.remove('active'));

    // Ініціалізація
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
            locateMe();
        }, 2500);
    });

    setInterval(() => {
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

    db.on('child_added', s => sync(s.key, s.val()));
    db.on('child_changed', s => sync(s.key, s.val()));
    db.on('child_removed', s => removeObject(s.key));
</script>

</body>
</html>
