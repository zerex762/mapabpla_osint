<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE 3D - Strategic Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #ff9d00; 
            --danger: #ff3333;
            --warning: #ffcc00;
            --success: #00ff88;
            --bg-dark: #0a0805;
            --glass: rgba(25, 15, 5, 0.85);
            --neon-border: rgba(255, 157, 0, 0.3);
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.9);
        }

        * { -webkit-user-select: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.8s ease-in-out;
        }
        .logo-anim { font-size: 24px; font-family: 'Orbitron'; color: var(--accent); margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .progress-bar { width: 250px; height: 2px; background: rgba(255, 157, 0, 0.1); overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: load 2.5s forwards; }
        @keyframes load { 100% { width: 100%; } }

        /* UI Styling */
        .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 2000; display: flex; justify-content: space-between; pointer-events: none; }
        .status-group { display: flex; gap: 10px; pointer-events: auto; }
        .box { background: var(--glass); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--neon-border); font-size: 11px; font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 8px; box-shadow: var(--panel-shadow); }
        .glow { color: var(--accent); text-shadow: 0 0 8px var(--accent); font-family: 'Orbitron'; }

        .side-panel { position: absolute; top: 20px; right: -350px; z-index: 2100; background: var(--glass); backdrop-filter: blur(15px); width: 280px; border-radius: 12px; transition: 0.4s; border: 1px solid var(--neon-border); box-shadow: var(--panel-shadow); }
        .side-panel.active { right: 20px; }
        .panel-header { padding: 15px; border-bottom: 1px solid rgba(255, 157, 0, 0.1); display: flex; justify-content: space-between; align-items: center; color: var(--accent); font-family: 'Orbitron'; font-weight: bold; }
        .panel-body { padding: 20px; }
        .data-label { color: rgba(255,255,255,0.4); font-size: 9px; display: block; margin-bottom: 4px; }
        .data-value { font-family: 'Orbitron'; color: #fff; font-size: 14px; margin-bottom: 15px; }

        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--glass); backdrop-filter: blur(15px); padding: 10px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--neon-border); }
        .c-btn { width: 45px; height: 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; }
        .c-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        /* Marker 3D Styles */
        .uav-marker { cursor: pointer; }
        .uav-icon { width: 32px; height: 32px; filter: invert(1) brightness(2) drop-shadow(0 0 5px var(--accent)); transition: 0.3s; }
        .uav-label { background: var(--bg-dark); color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-family: 'Orbitron'; font-weight: bold; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

        #mapNotify { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--accent); color: #000; padding: 5px 20px; border-radius: 4px; font-size: 10px; font-weight: 900; opacity: 0; transition: 0.3s; font-family: 'Orbitron'; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="splash-screen">
    <div class="logo-anim">SKY DEFENSE 3D</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<div id="map"></div>
<div id="mapNotify">3D ENGINE INITIALIZED</div>

<div class="top-ui">
    <div class="status-group">
        <div class="box"><i class="fa-solid fa-clock"></i> <span id="sysTime" class="glow">00:00:00</span></div>
        <div class="box"><i class="fa-solid fa-satellite-dish"></i> GPS: <span id="gpsStatus" style="color: var(--danger);">OFFLINE</span></div>
    </div>
    <div class="box"><i class="fa-solid fa-crosshairs"></i> ACTIVE: <span id="uavCount" class="glow">0</span></div>
</div>

<div id="sidePanel" class="side-panel">
    <div class="panel-header">
        <span>TRACKING INFO</span>
        <i class="fas fa-times" onclick="closeInfo()" style="cursor:pointer; opacity: 0.5;"></i>
    </div>
    <div class="panel-body">
        <span class="data-label">CLASSIFICATION</span>
        <div class="data-value" id="objType">--</div>
        <span class="data-label">COORDINATES</span>
        <div class="data-value" id="objCoords" style="color: var(--accent);">--</div>
        <span class="data-label">HEADING</span>
        <div class="data-value" id="objAngle">--</div>
    </div>
</div>

<div class="bottom-nav" id="ui-nav" style="display: none;">
    <button class="c-btn" onclick="nextTheme()" title="Toggle Layer"><i class="fa-solid fa-layer-group"></i></button>
    <button class="c-btn" onclick="locateMe()" title="My Location"><i class="fa-solid fa-location-crosshairs"></i></button>
    <button class="c-btn" onclick="resetRotation()" title="Reset Compass"><i class="fa-solid fa-compass"></i></button>
</div>

<script>
    // Firebase
    const firebaseConfig = { databaseURL: "https://shmap-8c0fa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('drones');

    // 3D Map Setup (MapLibre)
    const themes = [
        'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json'
    ];
    let tIdx = 0;

    const map = new maplibregl.Map({
        container: 'map',
        style: themes[0],
        center: [31.5, 48.5],
        zoom: 6,
        pitch: 50, // Кут нахилу для 3D
        bearing: 0,
        antialias: true
    });

    let obs = {};
    let userMarker = null;

    // ГЕОЛОКАЦІЯ
    function locateMe() {
        showNotify("SEARCHING SIGNAL...");
        navigator.geolocation.getCurrentPosition(pos => {
            const { longitude, latitude } = pos.coords;
            map.flyTo({ center: [longitude, latitude], zoom: 10, pitch: 60 });
            
            document.getElementById('gpsStatus').innerText = "ONLINE";
            document.getElementById('gpsStatus').style.color = "var(--success)";
            
            if (!userMarker) {
                const el = document.createElement('div');
                el.style.width = '15px'; el.style.height = '15px';
                el.style.background = '#007bff'; el.style.borderRadius = '50%';
                el.style.border = '2px solid white'; el.style.boxShadow = '0 0 10px #007bff';
                userMarker = new maplibregl.Marker({ element: el }).setLngLat([longitude, latitude]).addTo(map);
            } else {
                userMarker.setLngLat([longitude, latitude]);
            }
            showNotify("LOCATION FIXED");
        }, () => showNotify("SIGNAL ERROR"));
    }

    function resetRotation() {
        map.easeTo({ bearing: 0, pitch: 50 });
        showNotify("COMPASS RESET");
    }

    function nextTheme() {
        tIdx = (tIdx + 1) % themes.length;
        map.setStyle(themes[tIdx]);
        showNotify("LAYER UPDATED");
    }

    function showNotify(text) {
        const n = document.getElementById('mapNotify');
        n.innerText = text; n.style.opacity = "1";
        setTimeout(() => n.style.opacity = "0", 1500);
    }

    // Синхронізація дронів
    function sync(id, d) {
        if (!d) return;
        const now = Date.now();
        if ((now - (d.timestamp || now)) / 1000 / 60 > 30) { removeObject(id); return; }

        if (obs[id]) {
            obs[id].marker.setLngLat([d.lng, d.lat]);
            obs[id].icon.style.transform = `rotate(${d.angle || 0}deg)`;
            obs[id].data = d;
        } else {
            const el = document.createElement('div');
            el.className = 'uav-marker';
            
            const label = document.createElement('div');
            label.className = 'uav-label';
            label.innerText = (d.type || 'UAV').toUpperCase();

            const img = document.createElement('img');
            img.className = 'uav-icon';
            img.src = `${d.type}.png`;
            img.onerror = () => img.src = 'https://cdn-icons-png.flaticon.com/512/2503/2503508.png';
            img.style.transform = `rotate(${d.angle || 0}deg)`;

            el.appendChild(label);
            el.appendChild(img);
            el.onclick = () => updateUI(id, d);

            const marker = new maplibregl.Marker({ element: el })
                .setLngLat([d.lng, d.lat])
                .addTo(map);

            obs[id] = { marker, icon: img, data: d };
        }
        updateCounters();
    }

    function removeObject(id) {
        if(obs[id]) {
            obs[id].marker.remove();
            delete obs[id];
            updateCounters();
        }
    }

    function updateUI(id, d) {
        document.getElementById('sidePanel').classList.add('active');
        document.getElementById('objType').innerText = (d.type || 'UNKNOWN').toUpperCase();
        document.getElementById('objCoords').innerText = `${d.lat.toFixed(4)}, ${d.lng.toFixed(4)}`;
        document.getElementById('objAngle').innerText = `${Math.round(d.angle || 0)}°`;
    }

    function updateCounters() { document.getElementById('uavCount').innerText = Object.keys(obs).length; }
    function closeInfo() { document.getElementById('sidePanel').classList.remove('active'); }

    // Lifecycle
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('ui-nav').style.display = 'flex';
                locateMe();
            }, 800);
        }, 2600);
    });

    setInterval(() => {
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

    db.on('child_added', s => sync(s.key, s.val()));
    db.on('child_changed', s => sync(s.key, s.val()));
    db.on('child_removed', s => removeObject(s.key));
</script>
</body>
</html>
