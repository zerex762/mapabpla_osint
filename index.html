<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE - TERMINAL LCOK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --danger: #ff3333;
            --bg-dark: #05070a;
            --panel-bg: rgba(10, 15, 25, 0.95);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg-dark); font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        #system-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a101a 0%, #000 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }

        /* Фоновий шум та сітка */
        #system-lock::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px; pointer-events: none;
        }

        .terminal-box {
            position: relative; z-index: 10; width: 90%; max-width: 500px;
            background: var(--panel-bg); border-left: 3px solid var(--danger);
            padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        .alert-icon {
            font-size: 40px; color: var(--danger);
            animation: pulse 2s infinite;
        }

        .header-text h1 { 
            font-family: 'Orbitron'; font-size: 20px; color: #fff; margin: 0; letter-spacing: 2px;
        }

        .status-tag {
            font-size: 10px; background: rgba(255, 51, 51, 0.1); color: var(--danger);
            padding: 2px 8px; border: 1px solid var(--danger); margin-top: 5px; display: inline-block;
        }

        .content-area { color: rgba(255,255,255,0.7); font-size: 13px; line-height: 1.6; margin-bottom: 30px; }
        
        /* Логи завантаження */
        .logs {
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 4px;
            font-size: 11px; color: #555; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .log-line { margin-bottom: 4px; }
        .log-line span { color: var(--accent); }

        .btn-group { display: flex; align-items: center; gap: 20px; }

        .unlock-btn {
            background: var(--danger); border: none; color: #000;
            padding: 12px 30px; font-family: 'Orbitron'; font-weight: 700;
            font-size: 12px; cursor: pointer; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
        }

        .unlock-btn:hover {
            background: #fff; transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        .timer { font-size: 11px; color: #444; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        #bg-map {
            position: fixed; width: 100%; height: 100%; z-index: 1;
            filter: blur(20px) brightness(0.2); pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="bg-map" style="background: url('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/6/22/35'); background-size: cover;"></div>

<div id="system-lock">
    <div class="terminal-box">
        <div class="header">
            <div class="alert-icon"><i class="fas fa-terminal"></i></div>
            <div class="header-text">
                <h1>NODE_OFFLINE</h1>
                <div class="status-tag">RESTRICTED ACCESS</div>
            </div>
        </div>

        <div class="content-area">
            Тимчасове обмеження візуалізації. Виконується синхронізація з Firebase API та перевірка цілісності потоків даних (Stream Check).
            
            <div class="logs">
                <div class="log-line">[<span>OK</span>] DB_CONNECTION_ESTABLISHED</div>
                <div class="log-line">[<span>OK</span>] UA_GEO_DATA_LOADED</div>
                <div class="log-line">[<span>WAIT</span>] VALIDATING OPERATOR_TOKEN...</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="unlock-btn" onclick="startAuth()">
                УВІЙТИ В ТЕРМІНАЛ
            </button>
            <div class="timer">v4.0.2-STABLE</div>
        </div>
    </div>
</div>

<script>
    function startAuth() {
        const btn = document.querySelector('.unlock-btn');
        const logs = document.querySelector('.logs');
        
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> AUTHENTICATING...';
        btn.style.background = '#333';
        btn.style.color = '#fff';
        btn.disabled = true;

        // Додаємо імітацію логування перед входом
        setTimeout(() => {
            const newLine = document.createElement('div');
            newLine.className = 'log-line';
            newLine.innerHTML = '[<span>SUCCESS</span>] ACCESS_GRANTED_OPERATOR_01';
            logs.appendChild(newLine);
        }, 800);

        setTimeout(() => {
            const lock = document.getElementById('system-lock');
            lock.style.transition = "1s cubic-bezier(0.4, 0, 0.2, 1)";
            lock.style.opacity = "0";
            lock.style.filter = "blur(20px)";
            
            setTimeout(() => {
                lock.style.display = "none";
            }, 1000);
        }, 1800);
    }
</script>

</body>
</html>
