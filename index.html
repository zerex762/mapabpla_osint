<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>SKY DEFENSE — Технічні роботи</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --a:#e8ff00; --ar:rgba(232,255,0,.15);
  --glass:rgba(8,10,8,.82); --glass2:rgba(12,14,12,.92);
  --brd:rgba(255,255,255,.07);
  --sh:0 12px 40px rgba(0,0,0,.7);
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#050505;font-family:'Inter',sans-serif;overflow:hidden;color:#fff;}

body{
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  position:relative;
}

/* фоновий шум/сітка для атмосфери */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(232,255,0,.05), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(79,195,247,.05), transparent 40%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:34px 34px;
  mask-image:radial-gradient(circle at 50% 45%, rgba(0,0,0,.9), transparent 75%);
  pointer-events:none;
}

.box{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:var(--glass2);
  backdrop-filter:blur(18px);
  border:1px solid var(--brd);
  border-radius:20px;
  padding:32px 26px;
  text-align:center;
  box-shadow:var(--sh);
  animation:fadeUp .5s cubic-bezier(.4,0,.2,1);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

.icon-wrap{
  width:74px;height:74px;margin:0 auto 20px;
  border-radius:18px;
  background:var(--ar);
  border:1px solid rgba(232,255,0,.25);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.icon-wrap i{
  font-size:30px;color:var(--a);
  text-shadow:0 0 16px var(--a);
  animation:spin 3.5s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.icon-wrap::after{
  content:'';position:absolute;inset:-1px;border-radius:18px;
  border:1px solid var(--a);opacity:.35;
  animation:pulse 2s ease-out infinite;
}
@keyframes pulse{
  0%{transform:scale(1);opacity:.35}
  100%{transform:scale(1.35);opacity:0}
}

.title{
  font-family:'Orbitron';font-weight:700;font-size:15px;
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:6px;color:#fff;
}
.sub{
  font-family:'Orbitron';font-size:8.5px;letter-spacing:.25em;
  text-transform:uppercase;color:rgba(255,255,255,.25);
  margin-bottom:22px;
}

.msg{
  font-size:13px;line-height:1.7;color:rgba(255,255,255,.55);
  margin-bottom:22px;
}
.msg b{color:rgba(255,255,255,.85);}

.bar-wrap{
  width:100%;height:3px;border-radius:3px;
  background:rgba(255,255,255,.06);
  overflow:hidden;margin-bottom:10px;
}
.bar-fill{
  height:100%;width:35%;border-radius:3px;
  background:var(--a);box-shadow:0 0 10px var(--a);
  animation:load 1.8s ease-in-out infinite;
}
@keyframes load{
  0%{transform:translateX(-100%);width:35%}
  50%{transform:translateX(60%);width:45%}
  100%{transform:translateX(220%);width:35%}
}

.status{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Orbitron';font-size:9px;letter-spacing:.1em;
  color:var(--a);text-transform:uppercase;margin-bottom:22px;
}
.status .dot{
  width:6px;height:6px;border-radius:50%;background:var(--a);
  box-shadow:0 0 8px var(--a);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.footnote{
  font-size:10px;color:rgba(255,255,255,.3);line-height:1.6;
}
.footnote a{color:var(--a);text-decoration:none;}
.footnote a:hover{opacity:.8;}

.eta{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Orbitron';font-size:9px;letter-spacing:.08em;
  color:rgba(255,255,255,.4);
  background:rgba(255,255,255,.04);
  border:1px solid var(--brd);
  border-radius:20px;padding:6px 14px;margin-bottom:22px;
}
.eta i{color:var(--a);font-size:11px;}
</style>
</head>
<body>

<div class="box">
  <div class="icon-wrap"><i class="fa-solid fa-satellite-dish"></i></div>

  <div class="title">SKY DEFENSE</div>
  <div class="sub">Карта тимчасово недоступна</div>

  <div class="msg">
    Проводяться <b>технічні роботи</b> з оновлення карти та синхронізації даних.<br>
    Скоро все знову буде працювати швидше та точніше.
  </div>

  <div class="eta"><i class="fa-regular fa-clock"></i> Орієнтовно: 15–30 хвилин</div>

  <div class="bar-wrap"><div class="bar-fill"></div></div>

  <div class="status"><span class="dot"></span> Оновлення системи...</div>

  <div class="footnote">
    Дякуємо за терпіння 🙏<br>
    Новини та оновлення — у нашому Telegram-каналі
  </div>
</div>

</body>
</html>
