<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE - Strategic Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #00f2ff;
            --danger: #ff3333;
            --warning: #ff9d00;
            --success: #00ff88;
            --bg-dark: #05070a;
            --glass: rgba(10, 20, 35, 0.8);
            --neon-border: rgba(0, 242, 255, 0.25);
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { -webkit-user-select: none; -moz-user-select: none; user-select: none; }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-dark); font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 1s ease-out;
        }
        .boot-loader { width: 250px; text-align: left; font-family: 'Orbitron'; }
        .boot-text { font-size: 10px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .progress-bar { width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1); position: relative; overflow: hidden; }
        .progress-fill { 
            width: 0%; height: 100%; background: var(--accent); 
            box-shadow: 0 0 15px var(--accent); animation: load 2.5s forwards; 
        }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        .logo-anim { font-size: 24px; font-family: 'Orbitron'; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #privacy-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .policy-box {
            background: var(--glass); border: 1px solid var(--accent);
            padding: 30px; border-radius: 15px; max-width: 400px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        .policy-box h2 { font-family: 'Orbitron'; color: var(--accent); font-size: 18px; margin-top: 0; }
        .policy-box p { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.8); }
        .accept-btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 30px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
            margin-top: 20px; font-weight: bold;
        }
        .accept-btn:hover { background: var(--accent); color: #000; }

        /* Змінено фільтри для кращої видимості різних типів карт */
        #map { width: 100%; height: 100%; z-index: 1; background: #000; }
        .main-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; z-index: 1500; pointer-events: none; opacity: 0.4; }
        .main-crosshair span { position: absolute; width: 8px; height: 8px; border-color: var(--accent); border-style: solid; }
        .tl { top: 0; left: 0; border-width: 1.5px 0 0 1.5px; } .tr { top: 0; right: 0; border-width: 1.5px 1.5px 0 0; }
        .bl { bottom: 0; left: 0; border-width: 0 0 1.5px 1.5px; } .br { bottom: 0; right: 0; border-width: 0 1.5px 1.5px 0; }

        .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 2000; display: flex; justify-content: space-between; pointer-events: none; }
        .status-group { display: flex; gap: 10px; pointer-events: auto; }
        .box { background: var(--glass); backdrop-filter: blur(10px); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--neon-border); font-size: 11px; font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 8px; box-shadow: var(--panel-shadow); }
        .glow { color: var(--accent); text-shadow: 0 0 8px var(--accent); font-family: 'Orbitron'; }
        .osint-label { position: absolute; top: 75px; left: 50%; transform: translateX(-50%); z-index: 1999; font-family: 'Orbitron'; font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: rgba(255, 255, 255, 0.3); pointer-events: none; }

        .side-panel { position: absolute; top: 20px; right: -350px; z-index: 2100; background: var(--glass); backdrop-filter: blur(15px); width: 260px; border-radius: 12px; transition: 0.4s; border: 1px solid var(--neon-border); box-shadow: var(--panel-shadow); }
        .side-panel.active { right: 20px; }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .panel-header span { font-family: 'Orbitron'; font-weight: 700; color: var(--accent); font-size: 14px; }
        .panel-body { padding: 16px; }
        .data-block { margin-bottom: 12px; }
        .data-label { color: rgba(255,255,255,0.4); font-size: 9px; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; display: block; }
        .data-value { font-family: 'Orbitron'; color: #fff; font-size: 13px; }

        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--glass); backdrop-filter: blur(15px); padding: 8px 12px; border-radius: 16px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--neon-border); box-shadow: var(--panel-shadow); }
        .c-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: 0.2s; }
        .c-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--accent); }
        
        .c-btn.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        #mapNotify { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--accent); color: #000; padding: 4px 15px; border-radius: 4px; font-size: 9px; font-weight: 900; opacity: 0; transition: 0.3s; }

        @media (max-width: 600px) {
            .top-ui { flex-direction: column; gap: 8px; }
            .side-panel { width: calc(100% - 40px); top: auto; bottom: 90px; }
            .side-panel.active { right: 20px; left: 20px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="splash-screen">
    <div class="logo-anim" style="color:var(--accent)">SKY DEFENSE</div>
    <div class="boot-loader">
        <div class="boot-text" id="bootStatus">System Booting...</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
</div>

<div id="privacy-modal">
    <div class="policy-box">
        <h2>INITIALIZATION</h2>
        <p>Для розрахунку навігаційних параметрів та ETA необхідний доступ до геопозиції.</p>
        <button class="accept-btn" onclick="acceptPolicy()">ПРОДОВЖИТИ</button>
    </div>
</div>

<div class="main-crosshair">
    <span class="tl"></span><span class="tr"></span>
    <span class="bl"></span><span class="br"></span>
</div>

<div class="osint-label">Direct Data Feed</div>
<div id="mapNotify">SYNC COMPLETED</div>

<div class="top-ui">
    <div class="status-group">
        <div class="box"><i class="fa-solid fa-clock"></i> <span id="sysTime" class="glow">00:00:00</span></div>
        <div class="box"><i class="fa-solid fa-satellite-dish"></i> <span id="gpsStatus" style="color: var(--danger);">OFFLINE</span></div>
    </div>
    <div class="box"><i class="fa-solid fa-crosshairs"></i> ACTIVE: <span id="uavCount" class="glow">0</span></div>
</div>

<div id="sidePanel" class="side-panel">
    <div class="panel-header">
        <span>TRACKING INFO</span>
        <i class="fas fa-times" onclick="closeInfo()" style="cursor:pointer; font-size: 14px; opacity: 0.5;"></i>
    </div>
    <div class="panel-body">
        <div class="data-block"><span class="data-label">Class</span><div class="data-value" id="objType">--</div></div>
        <div class="data-block"><span class="data-label">Position</span><div class="data-value data-accent" id="objCoords">--</div></div>
        <div class="data-block" style="display: flex; justify-content: space-between;">
            <div style="width: 50%;"><span class="data-label">Range / ETA</span><div class="data-value" id="objRange">--</div></div>
            <div style="width: 50%;"><span class="data-label">Course</span><div class="data-value" id="objAngle">--</div></div>
        </div>
        <div class="data-block"><span class="data-label">Reference</span><div class="data-value" id="objId" style="font-size: 10px; opacity: 0.6;">--</div></div>
    </div>
</div>

<div id="map"></div>

<div class="bottom-nav">
    <button class="c-btn" onclick="nextTheme()" title="Змінити карту"><i class="fa-solid fa-layer-group"></i></button>
    <button class="c-btn" onclick="locateMe()"><i class="fa-solid fa-location-crosshairs"></i></button>
    <button id="addBtn" class="c-btn disabled"><i class="fas fa-plus"></i></button>
    <button id="delBtn" class="c-btn disabled"><i class="fas fa-trash-can"></i></button>
    <button class="c-btn" onclick="location.reload()"><i class="fas fa-sync"></i></button>
</div>

<script>
    // Покращені теми карт: Чорна, Супутник, Сіра, Світла
    const themes = [
        { name: "ULTRA DARK", url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' },
        { name: "SATELLITE", url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}' },
        { name: "GREY MODE", url: 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png' },
        { name: "LIGHT", url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png' }
    ];

    let tIdx = 0;
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        maxBounds: [[43, 21], [53, 41]], 
        minZoom: 5
    }).setView([48.4, 32.5], 6);
    
    let layer = L.tileLayer(themes[0].url).addTo(map);

    function nextTheme() {
        tIdx = (tIdx + 1) % themes.length;
        map.removeLayer(layer);
        layer = L.tileLayer(themes[tIdx].url).addTo(map);
        
        // Візуальне сповіщення про зміну теми
        const notify = document.getElementById('mapNotify');
        notify.innerText = "LAYER: " + themes[tIdx].name;
        notify.style.opacity = "1";
        setTimeout(() => notify.style.opacity = "0", 1500);

        // Динамічна корекція фільтрів карти
        const mapEl = document.getElementById('map');
        if (themes[tIdx].name === "SATELLITE") {
            mapEl.style.filter = "brightness(0.8) contrast(1.1)";
        } else if (themes[tIdx].name === "GREY MODE") {
            mapEl.style.filter = "grayscale(1) brightness(0.6) invert(1)";
        } else if (themes[tIdx].name === "LIGHT") {
            mapEl.style.filter = "brightness(0.9)";
        } else {
            mapEl.style.filter = "none";
        }
    }

    // Решта логіки (Firebase, UI, GPS) залишається без змін
    (function() {
        const block = () => { console.clear(); };
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) {
                block(); return false;
            }
        };
    })();

    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                checkPrivacy();
            }, 1000);
        }, 3000);
    });

    function checkPrivacy() {
        if (!localStorage.getItem('policyAccepted')) {
            document.getElementById('privacy-modal').style.display = 'flex';
        }
    }

    function acceptPolicy() {
        localStorage.setItem('policyAccepted', 'true');
        document.getElementById('privacy-modal').style.display = 'none';
        locateMe();
    }

    const firebaseConfig = { databaseURL: "https://shmap-8c0fa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('drones');

    const SPEED_MAP = {
        'shahed-vp-standart': 185, 'shahed-238-standart': 550, 'kalibr-standart': 880, 'tu-95ms-standart': 750
    };

    let userPos = null;
    let userMarker = null;

    function locateMe() { map.locate({setView: true, maxZoom: 10}); }

    map.on('locationfound', (e) => {
        userPos = e.latlng;
        document.getElementById('gpsStatus').innerText = "LINK ACTIVE";
        document.getElementById('gpsStatus').style.color = "var(--success)";
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker(userPos, { radius: 6, color: '#fff', weight: 2, fillColor: '#00f2ff', fillOpacity: 0.8 }).addTo(map);
    });

    let obs = {};

    function sync(id, d) {
        if (!d) return;
        const now = Date.now();
        if (now - (d.timestamp || now) > 30 * 60 * 1000) return;

        const angleRad = (d.angle - 90) * Math.PI / 180;
        const endLat = d.lat + (Math.cos(angleRad) * 0.025);
        const endLng = d.lng + (Math.sin(angleRad) * 0.025);

        if (obs[id]) {
            obs[id].marker.setLatLng([d.lat, d.lng]);
            obs[id].line.setLatLngs([[d.lat, d.lng], [endLat, endLng]]);
            obs[id].data = d;
        } else {
            const icon = L.divIcon({ 
                className: 'uav-icon', 
                html: `<img src="${d.type}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/583/583360.png'" style="width:32px; height:32px; transform:rotate(${d.angle || 0}deg);">`, 
                iconSize: [32, 32], iconAnchor: [16, 16] 
            });
            const marker = L.marker([d.lat, d.lng], { icon: icon }).addTo(map);
            const line = L.polyline([[d.lat, d.lng], [endLat, endLng]], { color: 'rgba(255,157,0,0.6)', weight: 2, dashArray: '5, 10' }).addTo(map);

            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                updateUI(id, d);
            });
            obs[id] = { marker, line, data: d };
        }
        updateCounters();
    }

    function updateUI(id, d) {
        document.getElementById('sidePanel').classList.add('active');
        document.getElementById('objId').innerText = "REF_" + id.substring(0,6).toUpperCase();
        document.getElementById('objType').innerText = d.type.replace('-standart', '').toUpperCase();
        document.getElementById('objCoords').innerText = `${d.lat.toFixed(3)}, ${d.lng.toFixed(3)}`;
        document.getElementById('objAngle').innerText = `${Math.round(d.angle)}°`;
        if (userPos) {
            const distance = (map.distance(userPos, [d.lat, d.lng]) / 1000);
            const timeMinutes = Math.round(distance / (SPEED_MAP[d.type] || 200) * 60);
            document.getElementById('objRange').innerHTML = `${distance.toFixed(1)} KM<br><span style="color:var(--accent); font-size:10px;">ETA: ${timeMinutes} MIN</span>`;
        }
    }

    function updateCounters() { document.getElementById('uavCount').innerText = Object.keys(obs).length; }
    function closeInfo() { document.getElementById('sidePanel').classList.remove('active'); }

    map.on('click', () => { closeInfo(); });

    setInterval(() => {
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

    db.on('child_added', s => sync(s.key, s.val()));
    db.on('child_changed', s => sync(s.key, s.val()));
    db.on('child_removed', s => { 
        if(obs[s.key]) { map.removeLayer(obs[s.key].marker); map.removeLayer(obs[s.key].line); delete obs[s.key]; }
        updateCounters(); closeInfo();
    });
</script>
</body>
</html>
