<script>
/* ==============================================================
   СПЛАШ‑ЕКРАН – гарантоване приховування
   ============================================================== */
window.addEventListener('load', function () {
  const splash   = document.getElementById('splash');
  const txt      = document.getElementById('sTxt');
  const messages = [
    'Loading OSINT feeds...',
    'Calibrating satellite...',
    'System nominal'
  ];
  let idx = 0;
  const interval = setInterval(() => {
    if (idx < messages.length) {
      txt.textContent = messages[idx++];
    } else {
      clearInterval(interval);
    }
  }, 800);

  // Функція, яка приховує splash (викликається з різних місць)
  function hideSplash() {
    splash.style.opacity = '0';
    splash.style.transition = 'opacity .35s';
    setTimeout(() => {
      splash.style.display = 'none';
      // Після приховування splash пытаємося запустити основну логіку
      try { launch(); } catch (e) {
        console.error('Launch failed:', e);
        // навіть якщо launch() упав – ми все одно показуємо інтерфейс,
        // щоб користувач не залишився на чорному екрані
        document.getElementById('fab').style.display = 'flex';
        toast('SYSTEM READY (with errors)');
      }
    }, 350);
  }

  // Спроба отримати доступ до локального сховища
  if (localStorage.getItem('sdOK')) {
    // Уже маземо згоду – приховуємо splash одразу після завантаження ресурсів
    // (через небольшую затримку, щоб анімація заставки завершилася)
    setTimeout(hideSplash, 2000);
  } else {
    // Потрібно показати модальне вікно з політикою конфіденційності
    showPrivacy();
    // Після того, як користувач натисне «ПРИЙНЯТИ ТА ЗАПУСТИТИ»,
    // функція acceptPolicy() викличе hideSplash()
  }

  // Фallback: якщо через 10 секунд splash до сих пор не прихований –
  // приховуємо його насильно, щоб уникнути «заvisania».
  setTimeout(() => {
    if (splash.style.display !== 'none') {
      console.warn('Splash timeout – forcing hide');
      hideSplash();
    }
  }, 15000);
});

/* ==============================================================
   ПОЛІТИКА КОНФІДЕНЦІЙНОСТІ
   ============================================================== */
function showPrivacy() {
  document.getElementById('privModal').style.display = 'flex';
  // Приховуємо основний вміст, щоб не блукало
  document.getElementById('map').style.filter = 'blur(18px) grayscale(1)';
}
function acceptPolicy() {
  localStorage.setItem('sdOK', '1');
  const modal = document.getElementById('privModal');
  modal.style.opacity = '0';
  modal.style.transition = 'opacity .35s';
  setTimeout(() => {
    modal.style.display = 'none';
    document.getElementById('map').style.filter = '';
    hideSplash();   // <-- приховуємо splash після прийняття політики
  }, 350);
}

/* ==============================================================
   ОСНОВНА ІНІЦІАЛІЗАЦІЯ (викликається після приховування splash)
   ============================================================== */
function launch() {
  // Показуємо плаваючую панель кнопок
  document.getElementById('fab').style.display = 'flex';
  // Спроба визначити геолокацію (з обробкою помилок)
  locateMe();
  toast('SYSTEM READY');
}

/* ==============================================================
   ГЕОЛОКАЦІЯ + ОБРОБКА ПОМИЛОК (щоб не блокувати splash)
   ============================================================== */
function locateMe() {
  if (!localStorage.getItem('sdOK')) return;
  // Додаємо таймаут, щоб не чекати безмежно
  map.locate({ setView: true, maxZoom: 10, timeout: 10000 });
}
map.on('locationfound', e => {
  // ... ( ваш існуючий код )
});
map.on('locationerror', e => {
  console.warn('Location error:', e.message);
  document.getElementById('gpsV').textContent = 'ERROR';
  document.getElementById('gpsV').style.color = 'var(--warn)';
  // За замовчуванням ставимо центр України
  userPos = null;
  if (uMarker) map.removeLayer(uMarker);
  uMarker = L.circleMarker([48.4, 32.5], {
    radius: 6, color: '#fff', weight: 2,
    fillColor: '#f5a623', fillOpacity: .9
  }).addTo(map);
  fetchWX(48.4, 32.5);
  if (document.getElementById('radarPanel').classList.contains('show')) drawRadar();
  toast('Локація недоступна. Використовується центр карти.');
});

/* ==============================================================
   Решта вашого коду (Firebase, погода, радар тощо) залишається без змін.
   Для скорості я не включаю його тут – просто скопіюйте його з вашого
   оригінального файла після цього блоку.
   ============================================================== */
</script>
