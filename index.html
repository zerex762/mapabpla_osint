<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE 3D - Strategic Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #ff9d00; 
            --danger: #ff3333;
            --bg-dark: #0a0805;
            --glass: rgba(25, 15, 5, 0.85);
            --neon-border: rgba(255, 157, 0, 0.3);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.8s;
        }
        .progress-bar { width: 200px; height: 2px; background: rgba(255, 157, 0, 0.1); margin-top: 20px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); animation: load 2s forwards; }
        @keyframes load { 100% { width: 100%; } }

        /* UI Overlays */
        .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 10; display: flex; justify-content: space-between; pointer-events: none; }
        .box { background: var(--glass); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--neon-border); font-size: 11px; pointer-events: auto; font-family: 'Orbitron'; }
        .glow { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 10; background: var(--glass); backdrop-filter: blur(15px); padding: 10px; border-radius: 20px; display: flex; gap: 15px; border: 1px solid var(--neon-border); }
        .c-btn { width: 45px; height: 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .c-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Drone Marker Styling */
        .uav-marker { cursor: pointer; }
        .uav-icon { width: 40px; height: 40px; filter: drop-shadow(0 0 5px var(--accent)); transition: transform 0.3s; }
        .uav-label { background: rgba(0,0,0,0.8); color: var(--accent); padding: 2px 5px; border-radius: 4px; font-size: 10px; border: 1px solid var(--accent); font-family: 'Orbitron'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

        #mapNotify { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 100; background: var(--accent); color: #000; padding: 5px 15px; border-radius: 4px; font-size: 10px; font-weight: bold; opacity: 0; transition: 0.3s; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div style="font-family: 'Orbitron'; color: var(--accent); font-size: 24px;">SKY DEFENSE 3D</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<div id="map"></div>
<div id="mapNotify">3D ENGINE READY</div>

<div class="top-ui">
    <div style="display:flex; gap:10px;">
        <div class="box">TIME: <span id="sysTime" class="glow">00:00:00</span></div>
        <div class="box">GPS: <span id="gpsStatus" style="color: var(--danger)">OFFLINE</span></div>
    </div>
    <div class="box">TARGETS: <span id="uavCount" class="glow">0</span></div>
</div>

<div class="bottom-nav">
    <button class="c-btn" onclick="rotateMap()"><i class="fa-solid fa-rotate"></i></button>
    <button class="c-btn" onclick="locateMe()"><i class="fa-solid fa-location-crosshairs"></i></button>
    <button class="c-btn" onclick="toggleTilt()"><i class="fa-solid fa-layer-group"></i></button>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://shmap-8c0fa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('drones');

    // Initialize 3D Map
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [31.1, 48.3], // Центр України
        zoom: 5.5,
        pitch: 45, // Кут нахилу
        bearing: 0,
        antialias: true
    });

    let drones = {};
    let isTilted = true;

    map.on('load', () => {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
        
        // Додаємо шар 3D будівель (якщо є в стилі)
        const layers = map.getStyle().layers;
        for (let i = 0; i < layers.length; i++) {
            if (layers[i].type === 'symbol' && layers[i].layout['text-field']) {
                // map.removeLayer(layers[i].id); // Можна приховати зайві назви
            }
        }
    });

    // Функція синхронізації дронів
    function syncDrone(id, data) {
        if (!data) return;

        if (drones[id]) {
            drones[id].marker.setLngLat([data.lng, data.lat]);
            drones[id].icon.style.transform = `rotate(${data.angle || 0}deg)`;
            drones[id].label.innerText = `${data.type || 'UAV'}`;
        } else {
            const el = document.createElement('div');
            el.className = 'uav-marker';
            
            const label = document.createElement('div');
            label.className = 'uav-label';
            label.innerText = data.type || 'UAV';
            
            const icon = document.createElement('img');
            icon.className = 'uav-icon';
            icon.src = `${data.type}.png`;
            icon.onerror = () => icon.src = 'https://cdn-icons-png.flaticon.com/512/2503/2503508.png';
            icon.style.transform = `rotate(${data.angle || 0}deg)`;

            el.appendChild(label);
            el.appendChild(icon);

            const marker = new maplibregl.Marker({ element: el })
                .setLngLat([data.lng, data.lat])
                .addTo(map);

            drones[id] = { marker, icon, label };
        }
        updateCount();
    }

    function removeDrone(id) {
        if (drones[id]) {
            drones[id].marker.remove();
            delete drones[id];
            updateCount();
        }
    }

    function updateCount() {
        document.getElementById('uavCount').innerText = Object.keys(drones).length;
    }

    // UI Functions
    function toggleTilt() {
        isTilted = !isTilted;
        map.easeTo({ pitch: isTilted ? 45 : 0, duration: 1000 });
        showNotify(isTilted ? "3D MODE" : "2D MODE");
    }

    function rotateMap() {
        const currentBearing = map.getBearing();
        map.easeTo({ bearing: currentBearing + 90, duration: 1000 });
    }

    function locateMe() {
        navigator.geolocation.getCurrentPosition(pos => {
            const { longitude, latitude } = pos.coords;
            map.flyTo({ center: [longitude, latitude], zoom: 12 });
            document.getElementById('gpsStatus').innerText = "ONLINE";
            document.getElementById('gpsStatus').style.color = "#00ff88";
            showNotify("LOCATION FIXED");
        }, () => showNotify("GPS ERROR"), { enableHighAccuracy: true });
    }

    function showNotify(text) {
        const n = document.getElementById('mapNotify');
        n.innerText = text; n.style.opacity = "1";
        setTimeout(() => n.style.opacity = "0", 2000);
    }

    // Real-time Listeners
    db.on('child_added', s => syncDrone(s.key, s.val()));
    db.on('child_changed', s => syncDrone(s.key, s.val()));
    db.on('child_removed', s => removeDrone(s.key));

    setInterval(() => {
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

</script>

</body>
</html>
