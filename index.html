<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>SKY DEFENSE - Strategic Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #ff9d00; 
            --danger: #ff3333;
            --warning: #ffcc00;
            --success: #00ff88;
            --bg-dark: #0a0805;
            --glass: rgba(25, 15, 5, 0.85);
            --neon-border: rgba(255, 157, 0, 0.3);
            --panel-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.9);
            --mono-gold: #ffcc00;
        }

        * { -webkit-user-select: none; -moz-user-select: none; user-select: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-dark); font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        
        /* UI Elements Styling */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.8s;
        }
        .boot-loader { width: 250px; text-align: left; font-family: 'Orbitron'; }
        .boot-text { font-size: 10px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .progress-bar { width: 100%; height: 2px; background: rgba(255, 157, 0, 0.1); position: relative; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: load 2.5s forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        #privacy-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .policy-box {
            background: var(--glass); border: 1px solid var(--accent);
            padding: 30px; border-radius: 15px; max-width: 500px; width: 90%;
            text-align: center; box-shadow: var(--panel-shadow);
        }
        .policy-content {
            text-align: left; font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.7);
            max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding: 15px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255, 157, 0, 0.1);
        }
        .accept-btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 12px 40px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
        }
        .accept-btn:hover { background: var(--accent); color: #000; }

        #map { width: 100%; height: 100%; z-index: 1; background: #000; }
        #map::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255, 157, 0, 0.03) 0px, rgba(255, 157, 0, 0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 1000;
        }

        .uav-label {
            background: rgba(10, 8, 5, 0.9) !important;
            border: 1px solid var(--accent) !important;
            color: var(--accent) !important;
            font-family: 'Orbitron' !important; font-size: 10px !important;
            padding: 2px 6px !important; border-radius: 4px !important;
        }

        .uav-icon img { width: 32px; height: 32px; filter: invert(1) brightness(2) drop-shadow(0 0 5px var(--accent)); }
        
        .top-ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 2000; display: flex; justify-content: space-between; pointer-events: none; }
        .status-group { display: flex; gap: 10px; pointer-events: auto; }
        .box { background: var(--glass); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--neon-border); font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .glow { color: var(--accent); text-shadow: 0 0 8px var(--accent); font-family: 'Orbitron'; }

        .side-panel { position: absolute; top: 20px; right: -350px; z-index: 2100; background: var(--glass); width: 280px; border-radius: 12px; transition: 0.4s; border: 1px solid var(--neon-border); }
        .side-panel.active { right: 20px; }
        .panel-header { padding: 15px; border-bottom: 1px solid rgba(255, 157, 0, 0.1); display: flex; justify-content: space-between; color: var(--accent); font-family: 'Orbitron'; }

        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 2000; background: var(--glass); padding: 10px; border-radius: 20px; display: flex; gap: 15px; border: 1px solid var(--neon-border); }
        .c-btn { width: 45px; height: 45px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .c-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        .lang-btn { font-family: 'Orbitron'; font-size: 10px; font-weight: bold; }

        #mapNotify { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 3000; background: var(--accent); color: #000; padding: 5px 20px; border-radius: 4px; font-size: 10px; font-weight: 900; opacity: 0; transition: 0.3s; font-family: 'Orbitron'; }

        @media (max-width: 600px) {
            .top-ui { flex-direction: column; gap: 8px; }
            .side-panel { width: calc(100% - 40px); bottom: 100px; top: auto; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="splash-screen">
    <div class="logo-anim" style="color:var(--accent); font-family: 'Orbitron'; font-size: 24px;">SKY DEFENSE</div>
    <div class="boot-loader">
        <div class="boot-text" id="bootStatus">Initializing...</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
</div>

<div id="privacy-modal">
    <div class="policy-box">
        <h2 id="modalTitle">ПРОТОКОЛ БЕЗПЕКИ</h2>
        <div class="policy-content" id="modalText">
            </div>
        <button class="accept-btn" onclick="acceptPolicy()" id="modalBtn">ПРИЙНЯТИ</button>
    </div>
</div>

<div id="map"></div>
<div id="mapNotify">SYNC</div>

<div class="top-ui">
    <div class="status-group">
        <div class="box"><i class="fa-solid fa-clock"></i> <span id="sysTime" class="glow">00:00:00</span></div>
        <div class="box"><i class="fa-solid fa-users"></i> <span id="lang-online">ONLINE</span>: <span id="onlineCount" class="glow">1</span></div>
    </div>
    <div class="box"><i class="fa-solid fa-crosshairs"></i> <span id="lang-active">ACTIVE</span>: <span id="uavCount" class="glow">0</span></div>
</div>

<div id="sidePanel" class="side-panel">
    <div class="panel-header">
        <span id="lang-info">TRACKING INFO</span>
        <i class="fas fa-times" onclick="closeInfo()" style="cursor:pointer; opacity: 0.5;"></i>
    </div>
    <div class="panel-body" style="padding: 20px;">
        <div style="margin-bottom:15px"><span id="lang-class" style="font-size:9px; opacity:0.5; text-transform:uppercase">Class</span><div id="objType" class="glow">--</div></div>
        <div style="margin-bottom:15px"><span id="lang-pos" style="font-size:9px; opacity:0.5; text-transform:uppercase">Position</span><div id="objCoords">--</div></div>
        <div><span id="lang-course" style="font-size:9px; opacity:0.5; text-transform:uppercase">Course</span><div id="objAngle">--</div></div>
    </div>
</div>

<div class="bottom-nav" id="ui-nav" style="display: none;">
    <button class="c-btn lang-btn" onclick="toggleLang()" id="langSwitcher">UA</button>
    <button class="c-btn" onclick="nextTheme()"><i class="fa-solid fa-layer-group"></i></button>
    <button class="c-btn" onclick="locateMe()"><i class="fa-solid fa-location-crosshairs"></i></button>
    <button class="c-btn" onclick="location.reload()"><i class="fas fa-sync"></i></button>
</div>

<script>
    // --- СИСТЕМА ПЕРЕКЛАДУ ---
    const translations = {
        uk: {
            boot: "Завантаження систем...",
            modalTitle: "ПРОТОКОЛ БЕЗПЕКИ",
            modalText: "<p><strong>1. ГЕОПОЗИЦІЯ:</strong> Доступ потрібен для розрахунку позиції цілей.</p><p><strong>2. ДЖЕРЕЛА:</strong> Дані базуються на OSINT-моніторингу.</p>",
            modalBtn: "ПРИЙНЯТИ ТА ЗАПУСТИТИ",
            online: "ОНЛАЙН",
            active: "ЦІЛІ",
            info: "ІНФОРМАЦІЯ",
            class: "Тип об'єкта",
            pos: "Координати",
            course: "Курс",
            notify_ready: "СИСТЕМА ГОТОВА",
            notify_layer: "КАРТА: "
        },
        en: {
            boot: "Initializing systems...",
            modalTitle: "SECURITY PROTOCOL",
            modalText: "<p><strong>1. GEOLOCATION:</strong> Access needed for target positioning.</p><p><strong>2. SOURCES:</strong> Data based on OSINT monitoring.</p>",
            modalBtn: "ACCEPT AND START",
            online: "ONLINE",
            active: "ACTIVE",
            info: "TRACKING INFO",
            class: "Object Class",
            pos: "Coordinates",
            course: "Course",
            notify_ready: "SYSTEM READY",
            notify_layer: "LAYER: "
        }
    };

    let currentLang = localStorage.getItem('appLang') || 'uk';

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('bootStatus').innerText = t.boot;
        document.getElementById('modalTitle').innerText = t.modalTitle;
        document.getElementById('modalText').innerHTML = t.modalText;
        document.getElementById('modalBtn').innerText = t.modalBtn;
        document.getElementById('lang-online').innerText = t.online;
        document.getElementById('lang-active').innerText = t.active;
        document.getElementById('lang-info').innerText = t.info;
        document.getElementById('lang-class').innerText = t.class;
        document.getElementById('lang-pos').innerText = t.pos;
        document.getElementById('lang-course').innerText = t.course;
        document.getElementById('langSwitcher').innerText = currentLang.toUpperCase();
        localStorage.setItem('appLang', currentLang);
    }

    function toggleLang() {
        currentLang = currentLang === 'uk' ? 'en' : 'uk';
        updateLanguage();
        showNotify("LANG: " + currentLang.toUpperCase());
    }

    // --- ОСНОВНА ЛОГІКА ---
    const firebaseConfig = { databaseURL: "https://shmap-8c0fa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('drones');

    const themes = [
        { name: "DARK", url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' },
        { name: "SATELLITE", url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }
    ];

    let tIdx = 0;
    const map = L.map('map', { zoomControl: false, attributionControl: false, minZoom: 5 }).setView([48.4, 32.5], 6);
    let layer = L.tileLayer(themes[0].url).addTo(map);

    function nextTheme() {
        tIdx = (tIdx + 1) % themes.length;
        map.removeLayer(layer);
        layer = L.tileLayer(themes[tIdx].url).addTo(map);
        showNotify(translations[currentLang].notify_layer + themes[tIdx].name);
    }

    function showNotify(text) {
        const n = document.getElementById('mapNotify');
        n.innerText = text; n.style.opacity = "1";
        setTimeout(() => n.style.opacity = "0", 1500);
    }

    function getLifetimeString(timestamp) {
        const diff = Math.floor((Date.now() - (timestamp || Date.now())) / 1000);
        const m = Math.floor(diff / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    let obs = {};

    function sync(id, d) {
        if (!d) return;
        const now = Date.now();
        if ((now - (d.timestamp || now)) / 1000 / 60 > 30) { removeObject(id); return; }

        if (obs[id]) {
            obs[id].marker.setLatLng([d.lat, d.lng]);
            obs[id].marker.setTooltipContent(getLifetimeString(d.timestamp));
            const img = obs[id].marker.getElement()?.querySelector('img');
            if (img) img.style.transform = `rotate(${d.angle || 0}deg)`;
            obs[id].data = d;
        } else {
            const icon = L.divIcon({ 
                className: 'uav-icon', 
                html: `<img src="${d.type}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2503/2503508.png';" style="transform:rotate(${d.angle || 0}deg);">`, 
                iconSize: [32, 32], iconAnchor: [16, 16] 
            });

            const marker = L.marker([d.lat, d.lng], { icon: icon }).addTo(map);
            marker.bindTooltip(getLifetimeString(d.timestamp), { permanent: true, direction: 'top', className: 'uav-label', offset: [0, -15] }).addTo(map);
            marker.on('click', () => updateUI(id, d));
            obs[id] = { marker, data: d };
        }
        updateCounters();
    }

    setInterval(() => {
        Object.keys(obs).forEach(id => {
            if(obs[id] && obs[id].data.timestamp) obs[id].marker.setTooltipContent(getLifetimeString(obs[id].data.timestamp));
        });
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    }, 1000);

    function removeObject(id) {
        if(obs[id]) { map.removeLayer(obs[id].marker); delete obs[id]; updateCounters(); }
    }

    function updateUI(id, d) {
        document.getElementById('sidePanel').classList.add('active');
        document.getElementById('objType').innerText = (d.type || 'UNKNOWN').toUpperCase();
        document.getElementById('objCoords').innerText = `${d.lat.toFixed(3)}, ${d.lng.toFixed(3)}`;
        document.getElementById('objAngle').innerText = `${Math.round(d.angle || 0)}°`;
    }

    function updateCounters() { document.getElementById('uavCount').innerText = Object.keys(obs).length; }
    function closeInfo() { document.getElementById('sidePanel').classList.remove('active'); }
    function locateMe() { map.locate({setView: true, maxZoom: 8}); }

    // Start
    window.addEventListener('load', () => {
        updateLanguage();
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            if (!localStorage.getItem('policyAccepted')) {
                document.getElementById('privacy-modal').style.display = 'flex';
            } else { fullStartup(); }
        }, 2600);
    });

    function acceptPolicy() {
        localStorage.setItem('policyAccepted', 'true');
        document.getElementById('privacy-modal').style.display = 'none';
        fullStartup();
    }

    function fullStartup() {
        document.getElementById('ui-nav').style.display = 'flex';
        showNotify(translations[currentLang].notify_ready);
    }

    db.on('child_added', s => sync(s.key, s.val()));
    db.on('child_changed', s => sync(s.key, s.val()));
    db.on('child_removed', s => removeObject(s.key));
</script>
</body>
</html>
