<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технічні роботи | MAPA BPLA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ефект сітки монітора на задньому плані */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(255, 51, 51, 0.2);
            border-radius: 12px;
            background: rgba(15, 15, 15, 0.8);
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.05);
            max-width: 90%;
            width: 450px;
            z-index: 3;
        }

        .icon-box {
            font-size: 50px;
            color: #ff3333;
            margin-bottom: 20px;
            animation: pulse 2s infinite alternate;
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        p {
            color: #8a8a8a;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid rgba(255, 51, 51, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff5555;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            animation: blink 1s infinite;
            box-shadow: 0 0 8px #ff3333;
        }

        /* Анімації */
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255,51,51,0.5)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 12px rgba(255,51,51,0.8)); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h1>Мапа тимчасово недоступна</h1>
        <p>Ведуться технічні роботи з оптимізації серверів та оновлення систем навігації. Скоро все повернеться до ладу.</p>
        
        <div class="status-badge">
            <div class="dot"></div>
            <span>Оновлення бэкенду</span>
        </div>
    </div>

</body>
</html>
