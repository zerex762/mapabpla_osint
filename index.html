<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>LOCK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #05070a; color: #fff; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 40px 40px; transform: rotateX(60deg); animation: move 20s linear infinite; z-index: 1; }
        @keyframes move { from { transform: rotateX(60deg) translateY(0); } to { transform: rotateX(60deg) translateY(40px); } }
        .box { position: relative; z-index: 10; text-align: center; padding: 40px; border-left: 4px solid #ff3333; background: rgba(10,15,25,0.9); backdrop-filter: blur(10px); }
        h1 { font-family: 'Orbitron'; font-size: 24px; letter-spacing: 5px; margin: 0 0 10px; color: #ff3333; }
        p { opacity: 0.6; font-size: 14px; margin-bottom: 30px; }
        button { background: #ff3333; border: none; color: #000; padding: 12px 30px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%); }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="box">
        <h1>МАПА ЗАКРИТА</h1>
        <p>Технічне обслуговування бази даних.<br>Доступ обмежено адміністратором.</p>
        <button onclick="this.innerHTML='ПЕРЕВІРКА...'; setTimeout(()=>location.reload(), 1000)">АВТОРИЗАЦІЯ</button>
    </div>
</body>
</html>
