<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мапа закрита</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            border: 1px solid #2a2a2a;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            color: #ff9800; /* Помаранчевий попереджувальний колір */
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #aaaaaa;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Мапа закрита на роботи</h1>
        <p>Зараз проводяться технічні роботи. Зачекайте, будь ласка, скоро все запрацює.</p>
    </div>

</body>
</html>
